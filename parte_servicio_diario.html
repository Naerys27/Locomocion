<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Parte de Servicio de Vehículo Diario</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#003a70">
<link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root {
      --blue: #0f6f9c;
      --bg: #f2f4f7;
      --card: #ffffff;
      --text: #1a1a1a;
      --orange: #f26b3a;
      --border: #d8e2ea;
      --input: #c8d6e0;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Segoe UI, Arial, sans-serif; background: var(--bg); color: var(--text); }
    .hdr { background: #003a70; color: #fff; padding: 12px 16px; display: flex; gap: 12px; align-items: center; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
    .back-btn { display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; font-size: 22px; line-height: 1; padding: 4px 6px; border-radius: 7px; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .back-btn:active { background: rgba(255,255,255,.2); }
    .hdr img { height: 32px; width: auto; display: block; }
    .hdr h1 { margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .hdr p { margin: 2px 0 0; font-size: 10px; opacity: .85; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 12px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .ch { background: #eef5f9; color: #0b3e56; padding: 10px 12px; font-weight: 700; font-size: 14px; border-bottom: 1px solid #dbe8ef; }
    .cb { padding: 12px; }
    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; }
    .f { grid-column: span 6; }
    .full { grid-column: 1 / -1; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 0 0 6px; }
    input, textarea { width: 100%; border: 1px solid var(--input); border-radius: 8px; padding: 10px 12px; background: #fff; font: inherit; }
    textarea { min-height: 80px; resize: vertical; }
    .sigbox { position: relative; border: 1px dashed #9fb7c6; border-radius: 10px; height: 170px; background: #fff; overflow: hidden; }
    #sigcanvas { width: 100%; height: 100%; display: block; touch-action: none; }
    .sighint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #64748b; font-size: 14px; pointer-events: none; }
    .actions { position: sticky; bottom: 0; display: flex; gap: 10px; justify-content: flex-end; background: linear-gradient(180deg, rgba(242,244,247,0), rgba(242,244,247,.95) 20%, rgba(242,244,247,1)); padding: 12px 0 4px; }
    button { border: 0; border-radius: 10px; padding: 12px 16px; font-weight: 700; font-size: 14px; cursor: pointer; }
    .pri { background: var(--blue); color: #fff; }
    .sec { background: #e5eef4; color: #123649; }
    .toast { position: fixed; right: 14px; bottom: 14px; background: #111827; color: #fff; padding: 10px 12px; border-radius: 10px; opacity: 0; transform: translateY(6px); transition: .2s; pointer-events: none; }
    .toast.on { opacity: 1; transform: none; }
    .err { display: none; background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 10px 12px; border-radius: 10px; margin-bottom: 12px; }
    @media (max-width: 760px) { .f { grid-column: 1 / -1; } }
  </style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const q = (id) => document.getElementById(id);
    const nval = (v) => parseFloat(String(v || '').replace(',', '.')) || 0;
    const fmtN = (v, d = 2) => Number(v || 0).toFixed(d).replace('.', ',');
    const gv = (id) => q(id)?.value || '';

    function fmtDateParts(iso) {
      if (!iso) return { d: '', m: '', y: '' };
      const p = iso.split('-');
      return p.length === 3 ? { y: p[0], m: p[1], d: p[2] } : { d: '', m: '', y: '' };
    }
    function formatFechaLarga(iso) {
      const p = fmtDateParts(iso);
      if (!p.d || !p.m || !p.y) return '';
      const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      return `Día ${parseInt(p.d,10)} de ${meses[(parseInt(p.m,10)||1)-1]} de ${p.y}`;
    }
    function toast(msg) { const t = q('toast'); t.textContent = msg; t.classList.add('on'); clearTimeout(t._tt); t._tt = setTimeout(() => t.classList.remove('on'), 1800); }
    function showErr(msg) { const e = q('errbox'); e.textContent = msg; e.style.display = 'block'; clearTimeout(e._tt); e._tt = setTimeout(() => e.style.display = 'none', 6000); }
    function recalc() {
      const s = nval(gv('cont_salida')), l = nval(gv('cont_llegada'));
      q('kms_recorridos').value = (l > s) ? String(l - s).replace('.', ',') : '';
      q('tot_eur').value = fmtN(nval(gv('p1')) + nval(gv('p2')) + nval(gv('p3')), 2);
      q('tot_lit').value = fmtN(nval(gv('l1')) + nval(gv('l2')) + nval(gv('l3')), 2);
    }
    function resetForm() { document.querySelectorAll('input, textarea').forEach(el => el.value = ''); recalc(); clearSig(); toast('Formulario limpiado'); }

    let sigDrawing = false, sigLX = 0, sigLY = 0;
    const sigCanvas = q('sigcanvas');
    const sigCtx = sigCanvas.getContext('2d');
    function resizeSigCanvas() { const box = q('sigbox'); sigCanvas.width = box.offsetWidth; sigCanvas.height = box.offsetHeight; }
    function getSigPos(ev) { const rect = sigCanvas.getBoundingClientRect(); if (ev.touches && ev.touches.length > 0) return { x: ev.touches[0].clientX - rect.left, y: ev.touches[0].clientY - rect.top }; return { x: ev.clientX - rect.left, y: ev.clientY - rect.top }; }
    function startSig(ev) { sigDrawing = true; const p = getSigPos(ev); sigLX = p.x; sigLY = p.y; }
    function moveSig(ev) { if (!sigDrawing) return; const p = getSigPos(ev); sigCtx.beginPath(); sigCtx.moveTo(sigLX, sigLY); sigCtx.lineTo(p.x, p.y); sigCtx.strokeStyle = '#111'; sigCtx.lineWidth = (ev.touches ? 3.8 : 3.2); sigCtx.lineCap = 'round'; sigCtx.stroke(); sigLX = p.x; sigLY = p.y; q('sighint').style.display = 'none'; }
    function endSig() { sigDrawing = false; }
    function clearSig() { sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height); q('sighint').style.display = ''; }
    window.addEventListener('resize', resizeSigCanvas);
    sigCanvas.addEventListener('mousedown', startSig);
    sigCanvas.addEventListener('mousemove', moveSig);
    sigCanvas.addEventListener('mouseup', endSig);
    sigCanvas.addEventListener('mouseleave', endSig);
    sigCanvas.addEventListener('touchstart', (ev) => { ev.preventDefault(); startSig(ev); }, { passive: false });
    sigCanvas.addEventListener('touchmove', (ev) => { ev.preventDefault(); moveSig(ev); }, { passive: false });
    sigCanvas.addEventListener('touchend', endSig);

          const fp = fmtDateParts(gv('fecha')); const f = fp.y ? `${fp.y}-${fp.m}-${fp.d}` : 'parte'; doc.save('Parte_servicio_diario_' + f + '.pdf'); toast('PDF generado correctamente');
        } catch (err) { showErr('ERROR: ' + err.message); }
        btn.textContent = 'Guardar PDF'; btn.disabled = false;
      }, 80);
    }

    resizeSigCanvas();
    recalc();
  </script>
